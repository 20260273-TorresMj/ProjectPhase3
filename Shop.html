
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wimpy Kidz | Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="container nav-container">
            <div class="logo"><a href="index.html"><span class="logo-icon">WK</span><span>wimpy kidz</span></a></div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="index.html" class="nav-item">Home</a></li>
                    <li><a href="Shop.html" class="nav-item active">Shop</a></li>
                    <li><a href="about.html" class="nav-item">About</a></li>
                    <li><a href="contact.html" class="nav-item">Contact</a></li>
                </ul>
                <div class="cart-icon-wrapper"><button id="cart-btn" class="cart-btn"><i class="fas fa-shopping-bag"></i><span id="cart-count" class="cart-count">0</span></button></div>
                <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
            </nav>
        </div>
    </header>

    <main>
        <section class="section shop-main">
            <div class="container">
                <h2 class="section-title">All Products</h2>
                <div class="products-grid" id="all-products-grid"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-col"><h4>wimpy kidz</h4><p>Refined essentials.</p></div>
                <div class="footer-col"><h4>Help</h4><a href="#">Shipping</a><a href="#">Returns</a></div>
                <div class="footer-col"><h4>Connect</h4><a href="#">Instagram</a><a href="#">Twitter</a></div>
            </div>
            <div class="footer-bottom"><p>© 2026 Wimpy Kidz</p></div>
        </div>
    </footer>

    <div id="cartOverlay" class="cart-overlay"></div>
    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header"><h3>Your Cart</h3><button id="closeCartBtn" class="close-cart">×</button></div>
        <div id="cartItemsList" class="cart-items"></div>
        <div id="cartTotal" class="cart-total">Total: ₱0.00</div>
        <button id="checkoutBtn" class="checkout-btn">Checkout →</button>
    </div>

    <script src="cart.js"></script>
    <script>
        const allProducts = [
            { id: 1, name: "Oversized Tee", price: 700, img: "wimpy2.jpg" },
            { id: 2, name: "Sweat Shirt", price: 1800, img: "Wimpy.png" },
            { id: 3, name: "Cargo Pants", price: 2000, img: "wimpy3.avif" },
            { id: 4, name: "NFL Beanie", price: 850, img: "Wimpy4.jpg" },
            { id: 5, name: "Nike Cortez", price: 3890, img: "WImpy5.jpg" },
            { id: 6, name: "NYC dad hat", price: 1450, img: "Wimpy6.jpg" },
            { id: 7, name: "FOG essentials", price: 1590, img: "Wimpy7.webp" },
            { id: 8, name: "Nike Elite Bag", price: 1290, img: "Wimpy8.jpg" }
        ];
        function renderShop() {
            const grid = document.getElementById('all-products-grid');
            if(grid) {
                grid.innerHTML = allProducts.map(p => `<div class="product-card"><img src="${p.img}" class="product-img"><div class="product-info"><div class="product-title">${p.name}</div><div class="product-price">₱${p.price.toLocaleString()}</div><button class="add-to-cart" data-id="${p.id}">Add to cart</button></div></div>`).join('');
                document.querySelectorAll('.add-to-cart').forEach(btn => { btn.addEventListener('click', () => { const id = parseInt(btn.dataset.id); const prod = allProducts.find(p=>p.id===id); if(window.addToCart) window.addToCart(prod); }); });
            }
        }
        renderShop();
        document.getElementById('mobileMenuBtn')?.addEventListener('click', () => { document.getElementById('navLinks')?.classList.toggle('mobile-open'); });
    </script>
</body>
</html>
